# omp config — swarm harness project settings
# Model routing for the build swarm

# Default model for all agents: DeepSeek V4 Pro via OpenRouter
model: openrouter/deepseek/deepseek-v4-pro

# Disable thinking by default (saves tokens, avoids credit limit issues)
thinking: off

# Task settings
task:
  maxRecursionDepth: 3

# Cost tracking
stats:
  enabled: true
