name: Implement PCR
# Loop: manual dispatch. Planner (Claude) triggers this with a PCR number.
# Implementer (DeepSeek V4 Pro) writes the product, then we open a PR.
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: PCR issue number
        required: true
      product_slug:
        description: Product folder slug (optional; derived from title if blank)
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate implementation
        id: impl
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          PRODUCT_SLUG: ${{ inputs.product_slug }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node workers/implement.mjs

      - name: Install product deps (best effort)
        if: steps.impl.outputs.budget_gate != 'pause'
        working-directory: products/${{ steps.impl.outputs.product_slug }}
        run: npm install --no-audit --no-fund || echo "install skipped/failed"

      - name: Open pull request
        if: steps.impl.outputs.budget_gate != 'pause'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="${{ steps.impl.outputs.product_slug }}"
          BRANCH="pcr/${{ inputs.issue_number }}-$SLUG"
          git config user.name "swarm-bot"
          git config user.email "swarm-bot@users.noreply.github.com"
          git fetch origin main
          git checkout -B "$BRANCH" FETCH_HEAD
          git add products/ specs/ evidence/
          git commit -m "feat: implement PCR #${{ inputs.issue_number }} ($SLUG)"
          git push -u origin "$BRANCH"
          gh pr create --title "PCR #${{ inputs.issue_number }}: $SLUG" \
            --body "Implements #${{ inputs.issue_number }}. Auto-generated by the swarm implementer (DeepSeek V4 Pro). Verify gate runs on this PR." \
            --base main --head "$BRANCH"
