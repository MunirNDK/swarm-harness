name: Fix Build (omp)
# Self-heals build errors using omp on a GitHub Actions cloud runner
on:
  workflow_dispatch:
    inputs:
      product_slug:
        description: Product slug to fix
        required: true
        default: daniells-auto-care
      branch:
        description: Branch to fix
        required: false

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install omp
        run: |
          curl -fsSL https://omp.sh/install | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install deps
        working-directory: products/${{ inputs.product_slug }}
        run: npm install --no-audit --no-fund 2>/dev/null || true

      - name: Self-heal with omp
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SLUG: ${{ inputs.product_slug }}
        run: |
          omp -p \
            --model openrouter/deepseek/deepseek-v4-pro \
            --thinking off \
            "Fix all build and type errors in products/$SLUG/. Run 'npx next build' and 'npx tsc --noEmit'. For each error, read the file, fix it, and rebuild. Iterate until clean — max 6 iterations. Preserve the design and content. Report final pass/fail."

      - name: Commit and push fixes
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "swarm-bot"
          git config user.email "swarm-bot@users.noreply.github.com"
          if ! git diff --exit-code; then
            git add products/${{ inputs.product_slug }}/
            git commit -m "fix: self-heal build (omp fixer)"
            git push
          else
            echo "No changes to commit"
          fi
