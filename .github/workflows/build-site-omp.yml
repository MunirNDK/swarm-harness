name: Build Site (omp)
# Orchestrator dispatches this. omp builds products/<slug> from specs/<slug> on GitHub's cloud.
on:
  workflow_dispatch:
    inputs:
      product_slug:
        description: Spec slug under specs/
        required: true
        default: daniells-auto-care
      issue_number:
        description: PCR issue number (for PR linking)
        required: false
      task:
        description: Override the default build task
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install omp
        run: |
          curl -fsSL https://omp.sh/install | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with omp
        id: omp
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SLUG: ${{ inputs.product_slug }}
        run: |
          TASK="${{ inputs.task }}"
          if [ -z "$TASK" ]; then
            TASK="Read specs/$SLUG/site-spec.json and design-system.md. Build all pages and components into products/$SLUG/. Follow the design system exactly. Import shared components only from paths listed in the spec. All content from the spec — no invented facts, no lorem ipsum. TypeScript strict mode. next/image with width/height. framer-motion animations, respect prefers-reduced-motion. lucide-react icons only, no emoji. Responsive 375/768/1024/1440. Accessibility: contrast 4.5:1, focus rings, alt text, labelled inputs. SEO: unique title/meta per page, JSON-LD. After writing all files, run 'npx next build' in products/$SLUG/ and fix any errors before yielding."
          fi
          omp -p \
            --model openrouter/deepseek/deepseek-v4-pro \
            --thinking off \
            "Build the project: $TASK"

      - name: Install product deps
        working-directory: products/${{ inputs.product_slug }}
        run: npm install --no-audit --no-fund 2>/dev/null || true

      - name: Build verification
        working-directory: products/${{ inputs.product_slug }}
        run: |
          npx next build 2>&1 | tee /tmp/build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::warning::Build failed — dispatch Fix Build (omp)"
            echo "build_failed=true" >> $GITHUB_OUTPUT
          else
            echo "build_failed=false" >> $GITHUB_OUTPUT
          fi
        id: build_check

      - name: Auto-trigger fixer if build failed
        if: steps.build_check.outputs.build_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Fix Build (omp)" \
            --repo ${{ github.repository }} \
            -f product_slug=${{ inputs.product_slug }}

      - name: Open pull request
        if: steps.build_check.outputs.build_failed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="${{ inputs.product_slug }}"
          NUM="${{ inputs.issue_number }}"
          BRANCH="pcr/${NUM:-0}-$SLUG"
          git config user.name "swarm-bot"
          git config user.email "swarm-bot@users.noreply.github.com"
          git fetch origin main
          git checkout -B "$BRANCH" FETCH_HEAD
          git add products/ specs/ evidence/
          git commit -m "feat: build $SLUG site (omp swarm)"
          git push -u origin "$BRANCH"
          cat > /tmp/pr-body.md << 'ENDBODY'
          ## omp Swarm Build

          Built by the swarm (DeepSeek V4 Pro via omp) from the spec.

          Gate: next build + tsc
          ENDBODY
          if [ -n "$NUM" ]; then
            echo "" >> /tmp/pr-body.md
            echo "Closes #$NUM" >> /tmp/pr-body.md
          fi
          gh pr create \
            --title "PCR: $SLUG (omp build)" \
            --body-file /tmp/pr-body.md \
            --base main --head "$BRANCH"
